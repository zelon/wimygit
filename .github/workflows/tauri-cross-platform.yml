name: Tauri Cross-Platform Build

on:
  push:
    branches:
      - tauri
  pull_request:
    branches:
      - tauri
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.platform }})

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: wimygit-tauri/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: wimygit-tauri/src-tauri

      - name: Install Linux system dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        working-directory: wimygit-tauri
        run: npm ci

      - name: Build Tauri app
        working-directory: wimygit-tauri
        run: npm run tauri build

      - name: Upload build artifacts (Windows)
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: wimygit-tauri-windows
          path: |
            wimygit-tauri/src-tauri/target/release/bundle/msi/*.msi
            wimygit-tauri/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

      - name: Upload build artifacts (macOS)
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: wimygit-tauri-macos
          path: |
            wimygit-tauri/src-tauri/target/release/bundle/dmg/*.dmg
            wimygit-tauri/src-tauri/target/release/bundle/macos/*.app
          if-no-files-found: warn

      - name: Upload build artifacts (Linux)
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: wimygit-tauri-linux
          path: |
            wimygit-tauri/src-tauri/target/release/bundle/deb/*.deb
            wimygit-tauri/src-tauri/target/release/bundle/rpm/*.rpm
            wimygit-tauri/src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn
