name: Nightly Release

on:
  workflow_dispatch:
    inputs:
      winget-publish:
        description: 'Publish to winget'
        type: boolean
        default: true

concurrency: 
  group: nightly-release
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare
    runs-on: windows-latest
    outputs:
      version: ${{ steps.config.outputs.version }}
      tag: ${{ steps.config.outputs.tag }}
      zipFileName: ${{ steps.config.outputs.zipFileName }}
      zipDownloadUrl: ${{ steps.config.outputs.zipDownloadUrl }}
    steps:
      - uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2
      - name: Increase Nightly Version and Git Push
        id: config
        shell: pwsh
        run: |
          ./cicd/IncreaseNightlyVersion.ps1

          $version = Get-Content .\cicd\NightlyVersion.txt
          Write-Host "version=$version"
          echo "version=$version" >> $env:GITHUB_OUTPUT

          $tag = "nightly-v$version"
          Write-Host "tag=$tag"
          echo "tag=$tag" >> $env:GITHUB_OUTPUT

          $zipFileName = "wimygit-windows-$tag.zip"
          Write-Host "zipFileName=$zipFileName"
          echo "zipFileName=$zipFileName" >> $env:GITHUB_OUTPUT

          $zipDownloadUrl = "https://github.com/zelon/wimygit/releases/download/$tag/$zipFileName"
          Write-Host "zipDownloadUrl=$zipDownloadUrl"
          echo "zipDownloadUrl=$zipDownloadUrl" >> $env:GITHUB_OUTPUT

          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'

          git add ./cicd/NightlyVersion.txt
          git commit -m "Update Nightly Version to $version"
          git push

          git tag $tag
          git push origin $tag

  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos
          - os: ubuntu-latest
            platform: linux
    needs: prepare
    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.platform }})

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: wimygit-tauri/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: wimygit-tauri/src-tauri

      - name: Install Linux system dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        working-directory: wimygit-tauri
        run: npm ci

      - name: Set Nightly Version and Icon
        id: config
        shell: pwsh
        working-directory: cicd
        run: |
          ./SetVersion.ps1 "${{ needs.prepare.outputs.version }}"
          ./SetNightlyVersionSetting.ps1

      - name: Build Tauri app
        working-directory: wimygit-tauri
        run: npm run tauri build

      - name: Upload build artifacts (Windows)
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: wimygit-windows
          path: |
            wimygit-tauri/src-tauri/target/release/wimygit.exe
            wimygit-tauri/src-tauri/target/release/bundle/msi/*.msi
            wimygit-tauri/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Upload build artifacts (macOS)
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: wimygit-macos
          path: |
            wimygit-tauri/src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Upload build artifacts (Linux)
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: wimygit-linux
          path: |
            wimygit-tauri/src-tauri/target/release/bundle/deb/*.deb
            wimygit-tauri/src-tauri/target/release/bundle/rpm/*.rpm
            wimygit-tauri/src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error

  release:
    name: Release
    needs: [prepare, build]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          # download all artifacts
          # pattern to get all artifacts
          pattern: wimygit-*
          path: all-artifacts
          merge-multiple: true # merge all artifacts into one folder

      - name: Display structure of downloaded files
        shell: pwsh
        run: Get-ChildItem all-artifacts -Recurse

      - name: Create winget zip
        shell: pwsh
        working-directory: all-artifacts
        run: |
          Move-Item wimygit.exe wimygitn.exe
          Compress-Archive -Path wimygitn.exe -DestinationPath "${{ needs.prepare.outputs.zipFileName }}" -Force
          Remove-Item wimygitn.exe

      - name: Create GitHub Release
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: all-artifacts
        run: |
          $title = "wimygit-${{ needs.prepare.outputs.tag }}"
          $files = Get-ChildItem -Path . -Include *.exe,*.zip,*.dmg,*.AppImage,*.deb,*.rpm -Recurse | ForEach-Object { $_.FullName }
          gh release create "${{ needs.prepare.outputs.tag }}" @files --generate-notes --prerelease --title $title

      - name: Winget Publish
        shell: pwsh
        if: ${{ inputs.winget-publish == true }}
        env:
          GITHUB_TOKEN: ${{ secrets.MY_PAT }}
        run: |
          $packageIdentifier = "Wimysoft.WimyGit.Nightly"
          $newVersion = "${{ needs.prepare.outputs.version }}"
          $newDownloadUrl = "${{ needs.prepare.outputs.zipDownloadUrl }}"
          ./cicd/CreateWingetPullRequest.ps1 submit -packageIdentifier $packageIdentifier -newVersion $newVersion -newDownloadUrl $newDownloadUrl -token $env:GITHUB_TOKEN
