# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: Nightly Release

on:
  workflow_dispatch:
    inputs:
      winget-publish:
        description: 'Publish to winget'
        type: boolean
        default: true

jobs:
  release:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v6
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Configure Git
      run: |
        git config --global user.name 'GitHub Action'
        git config --global user.email 'action@github.com'

    - name: Set New Nightly Version and Git Push
      id: config
      shell: pwsh
      run: |
        ./cicd/SetNewNightlyVersion.ps1

        $version = Get-Content .\cicd\NightlyVersion.txt
        Write-Host "version=$version"
        echo "version=$version" >> $env:GITHUB_OUTPUT

        $tag = "nightly-v$version"
        Write-Host "tag=$tag"
        echo "tag=$tag" >> $env:GITHUB_OUTPUT

        $zipFileName = "wimygit-$tag.zip"
        Write-Host "zipFileName=$zipFileName"
        echo "zipFileName=$zipFileName" >> $env:GITHUB_OUTPUT

        $zipDownloadUrl = "https://github.com/zelon/wimygit/releases/download/$tag/$zipFileName"
        Write-Host "zipDownloadUrl=$zipDownloadUrl"
        echo "zipDownloadUrl=$zipDownloadUrl" >> $env:GITHUB_OUTPUT

        git add ./cicd/NightlyVersion.txt
        git commit -m "Update Nightly Version to $version"
        git push
        
    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore

    - name: Test
      run: dotnet test --no-build --verbosity normal

    - name: DotNet Publish
      run: dotnet publish WimyGit -c Release /p:PublishProfile=ReleasePublishProfile

    - name: Create tag
      shell: pwsh
      run: |
        git config user.email "actions@github.com"
        git config user.name "GitHub Actions"
        
        git tag ${{ steps.config.outputs.tag }} --force
        git push origin ${{ steps.config.outputs.tag }} --force

    - name: Zip build folder
      shell: pwsh
      run: |
        Move-Item WimyGit\bin\Release\publish\WimyGit.exe WimyGit\bin\Release\publish\WimyGitN.exe
        Compress-Archive -Path WimyGit\bin\Release\publish\* -DestinationPath "${{ steps.config.outputs.zipFileName }}" -Force

    - name: Create GitHub Release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        $title = "wimygit-${{ steps.config.outputs.tag }}"
        gh release create "${{ steps.config.outputs.tag }}" "${{ steps.config.outputs.zipFileName }}" --generate-notes --prerelease --title $title

    - name: Winget Publish
      if: ${{ inputs.winget-publish == true }}
      env:
        GITHUB_TOKEN: ${{ secrets.MY_PAT }}
      run: |
        $packageIdentifier = "Wimysoft.WimyGit.Nightly"
        $newVersion = "${{ steps.config.outputs.version }}"
        $newDownloadUrl = "${{ steps.config.outputs.zipDownloadUrl }}"
        powershell .\cicd\CreateWingetPullRequest.ps1 submit -packageIdentifier $packageIdentifier -newVersion $newVersion -newDownloadUrl $newDownloadUrl -token $env:GITHUB_TOKEN
